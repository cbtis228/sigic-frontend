<ng-container *ngIf="showSkeletons; else formTemplate">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div
      *ngFor="let n of [1, 2, 3]"
      class="p-4 border rounded-lg bg-white shadow"
    >
      <div class="h-5 bg-gray-200 rounded w-1/2 mb-4 animate-pulse"></div>
      <div *ngFor="let field of [1, 2, 3, 4, 5, 6]" class="mb-3">
        <div class="h-3 bg-gray-200 rounded w-1/3 mb-2 animate-pulse"></div>
        <div class="h-9 bg-gray-200 rounded animate-pulse"></div>
      </div>
    </div>
  </div>
</ng-container>

<ng-template #formTemplate>
  <form [formGroup]="contactosForm" (ngSubmit)="onSubmit()">
    <div
      formArrayName="contactos"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
    >
      <app-card-with-title
        *ngFor="let contacto of contactos.controls; let i = index"
        [title]="'Contacto de emergencia ' + (i + 1)"
        [formGroupName]="i"
      >
        <div class="grid grid-cols-1 gap-3 sm:gap-4">
          <div class="field">
            <label
              for="nombre{{ i }}"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Nombre completo *
            </label>
            <input
              pInputText
              type="text"
              formControlName="nombre_completo"
              id="nombre{{ i }}"
              class="w-full p-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
          </div>

          <div class="field">
            <label
              for="parentesco{{ i }}"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Parentesco *
            </label>
            <input
              pInputText
              type="text"
              formControlName="parentesco"
              id="parentesco{{ i }}"
              class="w-full p-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
          </div>

          <div class="field">
            <label
              for="celular{{ i }}"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Celular *
            </label>
            <input
              pInputText
              type="tel"
              formControlName="celular"
              id="celular{{ i }}"
              class="w-full p-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
          </div>

          <div class="field">
            <label
              for="telefono{{ i }}"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Teléfono
            </label>
            <input
              pInputText
              type="tel"
              formControlName="telefono"
              id="telefono{{ i }}"
              class="w-full p-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
          </div>

          <div class="field">
            <label
              for="telefotno_trabajo{{ i }}"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Teléfono trabajo
            </label>
            <input
              pInputText
              type="tel"
              formControlName="telefono_trabajo"
              id="telefotno_trabajo{{ i }}"
              class="w-full p-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
          </div>

          <div class="field">
            <label
              for="correo_electronico{{ i }}"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Correo electrónico
            </label>
            <input
              pInputText
              type="email"
              formControlName="correo_electronico"
              id="correo_electronico{{ i }}"
              class="w-full p-2 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            />
          </div>
        </div>
      </app-card-with-title>
    </div>

    <div class="mt-6 flex justify-end gap-4">
      <button
        pButton
        type="button"
        severity="secondary"
        label="Regresar"
        icon="pi pi-arrow-left"
        class="shadow-lg"
        routerLink=".."
      ></button>
      <button
        pButton
        type="submit"
        severity="info"
        icon="pi pi-check-square"
        iconPos="right"
        label="Guardar Cambios"
        class="shadow-lg"
        [disabled]="contactosForm.invalid"
      ></button>
    </div>
  </form>
</ng-template>
