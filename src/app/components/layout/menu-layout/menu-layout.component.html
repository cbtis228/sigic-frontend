<section class="h-[calc(100%-4rem)] z-10 top-16 fixed shadow-md menu flex flex-col"
  [@slideInOut]="getMobileMenuState()" [@expandCollapse]="getDesktopMenuState()" [class.bg-white]="getMobileMenuState()"
  [class.z-[999]]="getMobileMenuState()">
  <div class="flex flex-col no-scrollbar items-center w-full flex-1 overflow-y-auto scrollbar-thin pb-4">
    <ng-container *ngFor="let item of menuItems">
      <div class="w-full">
        <a *ngIf="item.root" pRipple class="flex w-full cursor-pointer p-2 relative font-semibold select-none"
          (click)="onMenuItemClick(item)" [routerLink]="!item.customItems?.length ? item.routerLink : null">
          <div
            class="flex w-full h-full text-brand-800 items-center rounded-full transition-all duration-300 hover:bg-brand-600 hover:text-white hover:scale-100 px-2"
            [ngClass]="showLabelMenu() ? 'justify-between' : 'justify-center'">
            <div class="flex items-center space-x-2">
              <div class="flex items-center justify-center w-9 h-9 rounded-full">
                <i [ngClass]="item.icon" class="text-inherit transition-all duration-300" style="font-size: 1.5rem"></i>
              </div>

              <span *ngIf="showLabelMenu()">
                {{ item.label! | translate }}
              </span>
            </div>

            <i [ngClass]="item.icon" *ngIf="item.customItems?.length && showLabelMenu()"
              class="pi pi-angle-down transition-transform duration-300" [class.rotate-180]="item.expanded"></i>
          </div>
        </a>

        <div *ngIf="item.customItems?.length && item.expanded" class="flex flex-col pl-6 mt-1 space-y-1">
          <ng-container *ngFor="let child of item.customItems">
            
            <a [routerLink]="child.routerLink"
              class="p-2 text-sm rounded-lg cursor-pointer transition-all duration-300 hover:bg-brand-600 hover:text-white"
              (click)="onChildClick()">
              <i [ngClass]="child.icon" class="text-inherit transition-all duration-300" style="font-size: 1.5rem"></i> {{ child.label | translate }}
            </a>
          </ng-container>
        </div>
      </div>
    </ng-container>

    <button type="button" (click)="
        menuService.isDesktop()
          ? menuService.toggleDesktopMenu()
          : menuService.toggleMobileMenu()
      "
      class="mt-4 w-10 h-10 flex items-center justify-center rounded-full transition-all duration-300 hover:bg-brand-600 hover:text-white">
      <i *ngIf="menuService.isDesktop()" class="pi transition-transform duration-300" [ngClass]="{
          'pi-angle-left': showLabelMenu(),
          'pi-angle-right': !showLabelMenu(),
        }" style="font-size: 1.3rem"></i>
    </button>
  </div>
</section>
