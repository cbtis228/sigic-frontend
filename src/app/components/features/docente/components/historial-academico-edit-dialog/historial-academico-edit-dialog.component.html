<p-dialog
  header="Editar Historial Académico"
  [(visible)]="visible"
  [modal]="true"
  [closable]="false"
  [style]="{ width: '450px' }"
  [breakpoints]="{ '640px': '90vw', '768px': '70vw' }"
>
  <div class="flex flex-col gap-5 p-2">
    <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
      <h3 class="text-lg font-semibold text-blue-700 mb-1">
        {{ historialAcademico.materia.nombre }}
      </h3>
      <p class="text-gray-700 text-sm mb-1">
        <strong>Periodo:</strong> {{ historialAcademico.periodo || "-" }}
      </p>
      <p class="text-gray-700 text-sm mb-1">
        <strong>Tipo:</strong>
        {{ historialAcademico.tipo === 1 ? "Regular" : "Extraordinario" }}
      </p>
      <p class="text-gray-500 text-xs">
        Registrado: {{ historialAcademico.fecha_registro | date: "shortDate" }}
      </p>
    </div>

    <div>
      <label class="block text-gray-700 font-medium mb-1">Calificación</label>
      <p-inputNumber
        mode="decimal"
        [min]="0"
        [max]="10"
        [minFractionDigits]="1"
        [maxFractionDigits]="1"
        step="0.1"
        [(ngModel)]="calificacion"
        class="w-full"
        placeholder="0 – 10.0"
      />
    </div>

    <div class="flex justify-end gap-3 mt-3">
      <button
        pButton
        label="Cancelar"
        icon="pi pi-times"
        class="p-button-secondary"
        (click)="visibleChange.emit(false)"
      ></button>
      <button
        pButton
        label="Guardar"
        icon="pi pi-check"
        class="p-button-success"
        (click)="save()"
      ></button>
    </div>
  </div>
</p-dialog>
