<ng-container *ngIf="!loading; else skeleton">
  <a
    [routerLink]="link"
    class="flex items-center text-brand-500 justify-between gap-3 px-6 py-4 rounded-2xl bg-brand-100 font-medium shadow-md hover:bg-brand-300 hover:text-white hover:shadow-lg transition-all duration-300 ease-in-out group"
  >
    <!-- Texto -->
    <span class="text-lg font-semibold tracking-wide">
      {{ label }}
    </span>

    <!-- Icono con efecto -->
    <ng-container *ngIf="icon">
      <ng-container [ngTemplateOutlet]="icon"></ng-container>
    </ng-container>
  </a>
</ng-container>

<ng-template #skeleton>
  <div class="h-20 bg-gray-200 rounded-2xl animate-pulse"></div>
</ng-template>
