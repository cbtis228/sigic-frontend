<div class="p-4">
  <app-card-with-title [title]="'Datos del servicio social'">
    <!-- Skeleton mientras carga -->
    <div *ngIf="servicioSocial === null; else content">
      <div class="flex flex-col md:flex-row">
        <div class="flex flex-col w-full md:w-1/2 p-2">
          <label class="font-semibold text-brand-700 mb-1">Actividad</label>
          <div class="h-6 bg-gray-200 rounded animate-pulse w-3/4"></div>
        </div>
        <div class="flex flex-col w-full md:w-1/2 p-2">
          <label class="font-semibold text-brand-700 mb-1"
            >Horas acumuladas</label
          >
          <div class="h-6 bg-gray-200 rounded animate-pulse w-1/4"></div>
        </div>
      </div>
      <div class="flex flex-col md:flex-row">
        <div class="flex flex-col w-full md:w-1/2 p-2">
          <label class="font-semibold text-brand-700 mb-1">Fecha inicio</label>
          <div class="h-6 bg-gray-200 rounded animate-pulse w-2/4"></div>
        </div>
        <div class="flex flex-col w-full md:w-1/2 p-2">
          <label class="font-semibold text-brand-700 mb-1">Fecha fin</label>
          <div class="h-6 bg-gray-200 rounded animate-pulse w-2/4"></div>
        </div>
      </div>
      <div class="flex flex-col md:flex-row">
        <div class="flex flex-col w-full md:w-1/2 p-2">
          <label class="font-semibold text-brand-700 mb-1">Responsable</label>
          <div class="h-6 bg-gray-200 rounded animate-pulse w-3/4"></div>
        </div>
        <div class="flex flex-col w-full md:w-1/2 p-2">
          <label class="font-semibold text-brand-700 mb-1">Evidencia</label>
          <div class="h-6 bg-gray-200 rounded animate-pulse w-2/4"></div>
        </div>
      </div>
    </div>

    <!-- Contenido cuando hay datos o mensaje cuando no hay -->
    <ng-template #content>
      <div *ngIf="servicioSocial; else noData">
        <div class="flex flex-col md:flex-row">
          <div class="flex flex-col w-full md:w-1/2 p-2">
            <label class="font-semibold text-brand-700 mb-1">Actividad</label>
            <p class="text-gray-800">{{ servicioSocial.actividad || "-" }}</p>
          </div>
          <div class="flex flex-col w-full md:w-1/2 p-2">
            <label class="font-semibold text-brand-700 mb-1"
              >Horas acumuladas</label
            >
            <p class="text-gray-800">
              {{ servicioSocial.horas_acumuladas + "hrs" || "-" }}
            </p>
          </div>
        </div>
        <div class="flex flex-col md:flex-row">
          <div class="flex flex-col w-full md:w-1/2 p-2">
            <label class="font-semibold text-brand-700 mb-1"
              >Fecha inicio</label
            >
            <p class="text-gray-800">
              {{ servicioSocial.fecha_inicio || "-" }}
            </p>
          </div>
          <div class="flex flex-col w-full md:w-1/2 p-2">
            <label class="font-semibold text-brand-700 mb-1">Fecha fin</label>
            <p class="text-gray-800">{{ servicioSocial.fecha_fin || "-" }}</p>
          </div>
        </div>
        <div class="flex flex-col md:flex-row">
          <div class="flex flex-col w-full md:w-1/2 p-2">
            <label class="font-semibold text-brand-700 mb-1">Responsable</label>
            <p class="text-gray-800">{{ servicioSocial.responsable || "-" }}</p>
          </div>
          <div class="flex flex-col w-full md:w-1/2 p-2">
            <label class="font-semibold text-brand-700 mb-1">Evidencia</label>
            <p class="text-gray-800">{{ servicioSocial.evidencia || "-" }}</p>
          </div>
        </div>
      </div>

      <ng-template #noData>
        <div class="text-center py-8">
          <p class="text-gray-500">
            No se encontraron datos de servicio social
          </p>
        </div>
      </ng-template>
    </ng-template>
  </app-card-with-title>
</div>
