<div class="p-6 min-h-screen">
  <div
    class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden"
  >
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-gray-800">Mi Horario Semanal</h2>
        <span
          class="px-3 py-1 bg-brand-100 text-brand-700 rounded-full text-sm font-medium"
        >
          {{ horarios?.length || 0 }} clases
        </span>
      </div>

      <ng-container
        *ngIf="horarios; else horarioSkeleton"
      >
        <app-horario-semanal-card
          [showHeader]="false"
          [showGrupo]="true"
          [horarios]="horarios"
          [showActions]="false"
        ></app-horario-semanal-card>
      </ng-container>

      <ng-template #horarioSkeleton>
        <div class="space-y-4 animate-pulse">
          <div class="flex space-x-4 mb-6">
            <div
              class="h-8 bg-gradient-to-r from-brand-200 to-brand-300 rounded-lg w-32"
            ></div>
            <div
              class="h-8 bg-gradient-to-r from-brand-200 to-brand-300 rounded-lg w-24"
            ></div>
            <div
              class="h-8 bg-gradient-to-r from-brand-200 to-brand-300 rounded-lg w-28"
            ></div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            <div *ngFor="let i of [1, 2, 3, 4, 5]" class="space-y-3">
              <div class="h-6 bg-brand-200 rounded-lg w-full"></div>
              <div class="h-20 bg-brand-100 rounded-lg"></div>
              <div class="h-16 bg-brand-100 rounded-lg"></div>
            </div>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</div>
