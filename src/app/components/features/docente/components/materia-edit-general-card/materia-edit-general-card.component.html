<div class="p-2 md:p-6 min-h-screen">
  <form
    [formGroup]="materiaForm"
    (ngSubmit)="onSubmit()"
    *ngIf="!showSkeletons; else loadingTemplate"
    class="max-w-5xl mx-auto"
  >
    <app-card-with-title [title]="'Información del Materia'">
      <div class="p-5 bg-blue-50/30">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="space-y-4">
            <div class="field">
              <label
                for="nombre_materia"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span class="bg-blue-100 text-blue-800 rounded-full p-1 mr-2">
                  <i class="pi pi-book text-xs"></i>
                </span>
                Nombre <span class="text-red-500 ml-1">*</span>
              </label>
              <input
                pInputText
                type="text"
                formControlName="nombre"
                id="nombre"
                class="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                placeholder="Ej: Quimica 2"
              />
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  materiaForm.get('nombre')?.invalid &&
                  materiaForm.get('nombre')?.touched
                "
              >
                El nombre de la materia es requerido
              </small>
            </div>

            <div class="field">
              <label
                for="horas_practica"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-orange-100 text-orange-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-file-edit text-xs"></i>
                </span>
                Horas Practicas
              </label>
              <p-inputnumber
                formControlName="horas_practica"
                id="horas_practica"
                class="w-full"
                placeholder="Ej: 80"
              />
            </div>

            <div class="field">
              <label
                for="creditos"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-indigo-100 text-indigo-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-star text-xs"></i>
                </span>
                Creditos
              </label>
              <p-inputnumber
                type="number"
                formControlName="creditos"
                class="w-full"
                id="creditos"
                placeholder="Ej: 60"
              />
            </div>
          </div>

          <div class="space-y-4">
            <div class="field">
              <label
                for="clave"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span class="bg-green-100 text-green-800 rounded-full p-1 mr-2">
                  <i class="pi pi-graduation-cap text-xs"></i>
                </span>
                Clave <span class="text-red-500 ml-1">*</span>
              </label>
              <input
                pInputText
                type="text"
                formControlName="clave"
                id="clave"
                class="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                placeholder="Ej: Q1-2025-S2"
              />
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  materiaForm.get('clave')?.invalid &&
                  materiaForm.get('clave')?.touched
                "
              >
                La clave es requerida
              </small>
            </div>

            <div class="field">
              <label
                for="horas_teorica"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-indigo-100 text-indigo-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-file text-xs"></i>
                </span>
                Horas Teoricas
              </label>
              <p-inputnumber
                type="number"
                class="w-full"
                formControlName="horas_teorica"
                id="horas_teorica"
                placeholder="Ej: 60"
              />
            </div>

            <div class="field">
              <label
                for="estatus"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-yellow-100 text-yellow-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-check-circle text-xs"></i>
                </span>
                Estatus
              </label>
              <p-select
                inputId="estatus"
                formControlName="estatus"
                [options]="estadosMateria"
                optionLabel="label"
                optionValue="value"
                placeholder="Selecciona un estatus"
                class="w-full"
                appendTo="body"
              >
              </p-select>
            </div>
          </div>
        </div>

        <div class="mt-4">
          <div class="field">
            <label
              for="seriacion"
              class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
            >
              <span class="bg-pink-100 text-pink-800 rounded-full p-1 mr-2">
                <i class="pi pi-align-justify text-xs"></i>
              </span>
              Seriacion
            </label>
            <textarea
              pTextarea
              formControlName="seriacion"
              id="seriacion"
              class="w-full"
              placeholder="Ej: Primer Semestre"
              [autoResize]="true"
            ></textarea>
          </div>
        </div>
      </div>
    </app-card-with-title>

    <div class="flex flex-col sm:flex-row justify-end gap-4 mt-8 px-2">
      <button
        pButton
        type="button"
        class="p-button-outlined p-button-secondary shadow-md hover:shadow-lg transition-all duration-300 py-3 px-5 rounded-xl"
        icon="pi pi-arrow-left"
        label="Regresar"
        routerLink=".."
      ></button>
      <button
        pButton
        type="submit"
        class="shadow-md hover:shadow-lg transition-all duration-300 py-3 px-5 rounded-xl"
        icon="pi pi-check"
        iconPos="right"
        label="Guardar Cambios"
        [disabled]="materiaForm.invalid"
        [class]="{
          'p-button-success': !materiaForm.invalid,
          'p-button-disabled': materiaForm.invalid,
          'opacity-100': !materiaForm.invalid,
          'opacity-70': materiaForm.invalid,
        }"
      ></button>
    </div>
  </form>

  <ng-template #loadingTemplate>
    <div class="max-w-5xl mx-auto">
      <app-card-with-title [title]="'Información del Materia'">
        <div class="p-5 bg-blue-50/30">
          <div class="animate-pulse">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div class="space-y-5">
                <div *ngFor="let item of [1, 2, 3, 4]" class="space-y-3">
                  <div class="h-4 bg-gray-300 rounded w-1/3"></div>
                  <div class="h-12 bg-gray-300 rounded-xl"></div>
                </div>
              </div>
              <div class="space-y-5">
                <div *ngFor="let item of [1, 2, 3, 4]" class="space-y-3">
                  <div class="h-4 bg-gray-300 rounded w-1/3"></div>
                  <div class="h-12 bg-gray-300 rounded-xl"></div>
                </div>
              </div>
            </div>
            <div class="mt-4 space-y-3">
              <div class="h-4 bg-gray-300 rounded w-1/4"></div>
              <div class="h-12 bg-gray-300 rounded-xl"></div>
            </div>
          </div>
        </div>
      </app-card-with-title>

      <div class="flex justify-end gap-4 mt-8 px-2">
        <div class="h-12 bg-gray-300 rounded-xl w-32 animate-pulse"></div>
        <div class="h-12 bg-gray-300 rounded-xl w-40 animate-pulse"></div>
      </div>
    </div>
  </ng-template>
</div>
