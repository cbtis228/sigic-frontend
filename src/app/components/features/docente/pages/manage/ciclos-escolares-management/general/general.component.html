<div class="flex flex-col items-center gap-6 p-6">
  <!-- Header centrado -->
  <div
    *ngIf="permissionsService.has$('academico.change_cicloescolar') | async"
    class="flex flex-row justify-between items-center w-full max-w-4xl mb-4 gap-4"
  >
    <h2 class="text-2xl font-bold text-gray-800 text-left sm:text-left">
      Información General
    </h2>
    <p-button
      label="Editar"
      severity="info"
      icon="pi pi-pencil"
      routerLink="edit"
    />
  </div>

  <div class="w-1/2 max-w-4xl">
    <app-ciclo-escolar-general-info-card
      [cicloEscolar]="cicloEscolar"
      [loading]="!cicloEscolar"
    >
      ></app-ciclo-escolar-general-info-card
    >
  </div>
</div>
