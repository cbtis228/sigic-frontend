<div class="p-6 min-h-screen">
  <form
    [formGroup]="grupoForm"
    (ngSubmit)="onSubmit()"
    *ngIf="!showSkeletons; else loadingTemplate"
    class="max-w-5xl mx-auto"
  >
    <app-card-with-title [title]="'Información del Grupo'">
      <div class="p-5 bg-blue-50/30">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="space-y-4">
            <!-- Nombre del Grupo -->
            <div class="field">
              <label
                for="nombre_grupo"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span class="bg-blue-100 text-blue-800 rounded-full p-1 mr-2">
                  <i class="pi pi-users text-xs"></i>
                </span>
                Nombre del Grupo <span class="text-red-500 ml-1">*</span>
              </label>
              <input
                pInputText
                type="text"
                formControlName="nombre_grupo"
                id="nombre_grupo"
                class="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                placeholder="Ej: 1°A Primaria"
              />
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  grupoForm.get('nombre_grupo')?.invalid &&
                  grupoForm.get('nombre_grupo')?.touched
                "
              >
                El nombre del grupo es requerido
              </small>
            </div>

            <!-- Nivel Educativo -->
            <div class="field">
              <label
                for="nivel"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span class="bg-green-100 text-green-800 rounded-full p-1 mr-2">
                  <i class="pi pi-graduation-cap text-xs"></i>
                </span>
                Nivel Educativo <span class="text-red-500 ml-1">*</span>
              </label>
              <input
                pInputText
                type="text"
                formControlName="nivel"
                id="nivel"
                class="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                placeholder="Ej: 1°A Primaria"
              />
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  grupoForm.get('nivel')?.invalid &&
                  grupoForm.get('nivel')?.touched
                "
              >
                El nivel es requerido
              </small>
            </div>

            <!-- Año Escolar -->
            <div class="field">
              <label
                for="anio_escolar"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-purple-100 text-purple-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-calendar text-xs"></i>
                </span>
                Año Escolar <span class="text-red-500 ml-1">*</span>
              </label>
              <input
                pInputText
                type="number"
                formControlName="anio_escolar"
                id="anio_escolar"
                class="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                placeholder="Ej: 2024"
                min="2000"
                max="2100"
              />
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  grupoForm.get('anio_escolar')?.invalid &&
                  grupoForm.get('anio_escolar')?.touched
                "
              >
                El año escolar es requerido y debe ser válido
              </small>
            </div>

            <!-- Ciclo Escolar -->
            <div class="field">
              <label
                for="ciclo_escolar"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-indigo-100 text-indigo-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-book text-xs"></i>
                </span>
                Ciclo Escolar <span class="text-red-500 ml-1">*</span>
              </label>

              <app-ciclo-escolar-autocomplete
                formControlName="ciclo_escolar"
                placeholder="Buscar ciclo escolar..."
                [required]="true"
              ></app-ciclo-escolar-autocomplete>
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  grupoForm.get('ciclo_escolar')?.invalid &&
                  grupoForm.get('ciclo_escolar')?.touched
                "
              >
                El ciclo escolar es requerido
              </small>
            </div>
          </div>

          <div class="space-y-4">
            <!-- Turno -->
            <div class="field">
              <label
                for="turno"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-orange-100 text-orange-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-clock text-xs"></i>
                </span>
                Turno <span class="text-red-500 ml-1">*</span>
              </label>
              <input
                pInputText
                formControlName="turno"
                id="turno"
                class="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                placeholder="Ej: 30"
                min="1"
                max="50"
              />
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  grupoForm.get('turno')?.invalid &&
                  grupoForm.get('turno')?.touched
                "
              >
                El turno es requerido
              </small>
            </div>

            <!-- Docente -->
            <div class="field">
              <label
                for="docente"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span class="bg-teal-100 text-teal-800 rounded-full p-1 mr-2">
                  <i class="pi pi-user text-xs"></i>
                </span>
                Docente <span class="text-red-500 ml-1">*</span>
              </label>
              <app-docente-autocomplete
                formControlName="docente"
                placeholder="Buscar docente..."
                [required]="true"
              ></app-docente-autocomplete>
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  grupoForm.get('docente')?.invalid &&
                  grupoForm.get('docente')?.touched
                "
              >
                El docente es requerido
              </small>
            </div>

            <!-- Capacidad Máxima -->
            <div class="field">
              <label
                for="capacidad_maxima"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span class="bg-red-100 text-red-800 rounded-full p-1 mr-2">
                  <i class="pi pi-users text-xs"></i>
                </span>
                Capacidad Máxima
              </label>
              <input
                pInputText
                type="number"
                formControlName="capacidad_maxima"
                id="capacidad_maxima"
                class="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                placeholder="Ej: 30"
                min="1"
                max="50"
              />
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  grupoForm.get('capacidad_maxima')?.invalid &&
                  grupoForm.get('capacidad_maxima')?.touched
                "
              >
                La capacidad máxima debe ser un número válido
              </small>
            </div>

            <!-- Estatus -->
            <div class="field">
              <label
                for="estatus"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-yellow-100 text-yellow-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-check-circle text-xs"></i>
                </span>
                Estatus
              </label>
              <p-select
                inputId="estatus"
                formControlName="estatus"
                [options]="estadosCiclo"
                optionLabel="label"
                optionValue="value"
                placeholder="Selecciona un estatus"
                class="w-full"
                appendTo="body"
              >
              </p-select>
            </div>
          </div>
        </div>

        <!-- Período (si aplica) -->
        <div class="mt-4">
          <div class="field">
            <label
              for="periodo"
              class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
            >
              <span class="bg-pink-100 text-pink-800 rounded-full p-1 mr-2">
                <i class="pi pi-calendar-times text-xs"></i>
              </span>
              Período (Opcional)
            </label>
            <input
              pInputText
              type="text"
              formControlName="periodo"
              id="periodo"
              class="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
              placeholder="Ej: Primer Semestre"
            />
          </div>
        </div>
      </div>
    </app-card-with-title>

    <div class="flex flex-col sm:flex-row justify-end gap-4 mt-8 px-2">
      <button
        pButton
        type="button"
        class="p-button-outlined p-button-secondary shadow-md hover:shadow-lg transition-all duration-300 py-3 px-5 rounded-xl"
        icon="pi pi-arrow-left"
        label="Regresar"
        [routerLink]="'/grupos/data/general'"
      ></button>
      <button
        pButton
        type="submit"
        class="shadow-md hover:shadow-lg transition-all duration-300 py-3 px-5 rounded-xl"
        icon="pi pi-check"
        iconPos="right"
        label="Guardar Cambios"
        [disabled]="grupoForm.invalid"
        [class]="{
          'p-button-success': !grupoForm.invalid,
          'p-button-disabled': grupoForm.invalid,
          'opacity-100': !grupoForm.invalid,
          'opacity-70': grupoForm.invalid,
        }"
      ></button>
    </div>
  </form>

  <ng-template #loadingTemplate>
    <div class="max-w-5xl mx-auto">
      <app-card-with-title [title]="'Información del Grupo'">
        <div class="p-5 bg-blue-50/30">
          <div class="animate-pulse">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div class="space-y-5">
                <div *ngFor="let item of [1, 2, 3, 4]" class="space-y-3">
                  <div class="h-4 bg-gray-300 rounded w-1/3"></div>
                  <div class="h-12 bg-gray-300 rounded-xl"></div>
                </div>
              </div>
              <div class="space-y-5">
                <div *ngFor="let item of [1, 2, 3, 4]" class="space-y-3">
                  <div class="h-4 bg-gray-300 rounded w-1/3"></div>
                  <div class="h-12 bg-gray-300 rounded-xl"></div>
                </div>
              </div>
            </div>
            <div class="mt-4 space-y-3">
              <div class="h-4 bg-gray-300 rounded w-1/4"></div>
              <div class="h-12 bg-gray-300 rounded-xl"></div>
            </div>
          </div>
        </div>
      </app-card-with-title>

      <div class="flex justify-end gap-4 mt-8 px-2">
        <div class="h-12 bg-gray-300 rounded-xl w-32 animate-pulse"></div>
        <div class="h-12 bg-gray-300 rounded-xl w-40 animate-pulse"></div>
      </div>
    </div>
  </ng-template>
</div>
