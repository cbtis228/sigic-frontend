<form
  [formGroup]="facturacionForm"
  *ngIf="!showSkeletons; else loadingTemplate"
  (ngSubmit)="onSubmit()"
>
  <app-card-with-title [title]="'Datos de Facturación'">
    <div
      class="grid grid-cols-1 xs:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4"
    >
      <!-- RFC -->
      <div class="field">
        <label for="rfc" class="block text-sm font-medium text-gray-700 mb-1">
          RFC
        </label>
        <input
          pInputText
          type="text"
          formControlName="rfc"
          id="rfc"
          maxlength="13"
          class="w-full p-2 text-sm sm:text-base border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors uppercase"
        />
      </div>

      <!-- Razón Social -->
      <div class="field xs:col-span-2 md:col-span-2">
        <label
          for="razon_social"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Razón Social
        </label>
        <input
          pInputText
          type="text"
          formControlName="razon_social"
          id="razon_social"
          class="w-full p-2 text-sm sm:text-base border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
        />
      </div>

      <!-- Código Postal -->
      <div class="field">
        <label
          for="codigo_postal"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Código Postal
        </label>
        <input
          pInputText
          type="text"
          formControlName="codigo_postal"
          id="codigo_postal"
          maxlength="5"
          class="w-full p-2 text-sm sm:text-base border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
        />
      </div>

      <!-- Régimen Fiscal -->
      <div class="field xs:col-span-2">
        <label
          for="regimen_fiscal"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Régimen Fiscal
        </label>
        <input
          pInputText
          type="text"
          formControlName="regimen_fiscal"
          id="regimen_fiscal"
          class="w-full p-2 text-sm sm:text-base border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
        />
      </div>

      <!-- Uso de Factura -->
      <div class="field col-span-1 md:col-span-3">
        <label
          for="uso_factura"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Uso de Factura
        </label>
        <input
          pInputText
          type="text"
          formControlName="uso_factura"
          id="uso_factura"
          class="w-full p-2 text-sm sm:text-base border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
        />
      </div>

      <!-- Domicilio Fiscal -->
      <div class="field xs:col-span-2 md:col-span-3 lg:col-span-4">
        <label
          for="domicilio_fiscal"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Domicilio Fiscal
        </label>
        <textarea
          pInputText
          formControlName="domicilio_fiscal"
          id="domicilio_fiscal"
          rows="3"
          class="w-full p-2 text-sm sm:text-base border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors resize-none"
        ></textarea>
      </div>
    </div>
  </app-card-with-title>

  <!-- Botones -->
  <div class="mt-4 flex justify-end gap-4">
    <button
      pButton
      type="button"
      severity="secondary"
      label="Regresar"
      icon="pi pi-arrow-left"
      class="shadow-lg"
      routerLink=".."
    ></button>
    <button
      pButton
      type="submit"
      severity="info"
      icon="pi pi-check-square"
      iconPos="right"
      label="Guardar Cambios"
      class="shadow-lg"
      [disabled]="facturacionForm.invalid"
    ></button>
  </div>
</form>

<!-- Loader -->
<ng-template #loadingTemplate>
  <div
    class="grid grid-cols-1 xs:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4"
  >
    <div
      *ngFor="let i of [1, 2, 3, 4, 5, 6]"
      class="field xs:col-span-2 md:col-span-2 lg:col-span-2"
    >
      <div class="h-4 bg-gray-200 rounded w-1/3 mb-2 animate-pulse"></div>
      <div class="h-10 bg-gray-200 rounded animate-pulse"></div>
    </div>
  </div>
</ng-template>
