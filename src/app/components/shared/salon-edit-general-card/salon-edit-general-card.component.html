<div class="p-6 min-h-screen">
  <form
    [formGroup]="salonForm"
    (ngSubmit)="onSubmit()"
    *ngIf="!showSkeletons; else loadingTemplate"
    class="max-w-5xl mx-auto"
  >
    <app-card-with-title [title]="'Información del Salón'">
      <div class="p-5 bg-blue-50/30">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="space-y-4">
            <!-- Nombre -->
            <div class="field">
              <label
                for="nombre"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span class="bg-blue-100 text-blue-800 rounded-full p-1 mr-2">
                  <i class="pi pi-home text-xs"></i>
                </span>
                Nombre del salón <span class="text-red-500 ml-1">*</span>
              </label>
              <input
                pInputText
                type="text"
                id="nombre"
                formControlName="nombre"
                placeholder="Ej: Salón A-1"
                class="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
              />
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  salonForm.get('nombre')?.invalid &&
                  salonForm.get('nombre')?.touched
                "
              >
                El nombre es requerido
              </small>
            </div>

            <!-- Ubicación -->
            <div class="field">
              <label
                for="ubicacion"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span class="bg-green-100 text-green-800 rounded-full p-1 mr-2">
                  <i class="pi pi-map-marker text-xs"></i>
                </span>
                Ubicación
              </label>
              <input
                pInputText
                type="text"
                id="ubicacion"
                formControlName="ubicacion"
                placeholder="Ej: Planta baja, Edificio B"
                class="w-full p-3.5 border border-gray-300 rounded-xl"
              />
            </div>
          </div>

          <div class="space-y-4">
            <!-- Capacidad -->
            <div class="field">
              <label
                for="capacidad"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-orange-100 text-orange-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-users text-xs"></i>
                </span>
                Capacidad
              </label>
              <input
                pInputText
                type="number"
                id="capacidad"
                formControlName="capacidad"
                placeholder="Ej: 30"
                class="w-full p-3.5 border border-gray-300 rounded-xl"
              />
            </div>

            <!-- Tipo -->
            <div class="field">
              <label
                for="tipo"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-yellow-100 text-yellow-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-tag text-xs"></i>
                </span>
                Tipo de salón <span class="text-red-500 ml-1">*</span>
              </label>
              <p-select
                formControlName="tipo"
                [options]="tiposSalon"
                optionLabel="label"
                optionValue="value"
                placeholder="Seleccione un tipo"
                appendTo="body"
                class="w-full"
              ></p-select>
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  salonForm.get('tipo')?.invalid &&
                  salonForm.get('tipo')?.touched
                "
              >
                El tipo es requerido
              </small>
            </div>

            <!-- Estatus -->
            <div class="field">
              <label
                for="estatus"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-purple-100 text-purple-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-check-circle text-xs"></i>
                </span>
                Estatus <span class="text-red-500 ml-1">*</span>
              </label>
              <p-select
                formControlName="estatus"
                [options]="estadosGenerales"
                optionLabel="label"
                optionValue="value"
                placeholder="Seleccione un estatus"
                appendTo="body"
                class="w-full"
              ></p-select>
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  salonForm.get('estatus')?.invalid &&
                  salonForm.get('estatus')?.touched
                "
              >
                El estatus es requerido
              </small>
            </div>
          </div>
        </div>
      </div>
    </app-card-with-title>

    <div class="flex flex-col sm:flex-row justify-end gap-4 mt-8 px-2">
      <button
        pButton
        type="button"
        class="p-button-outlined p-button-secondary py-3 px-5 rounded-xl shadow-md hover:shadow-lg"
        icon="pi pi-arrow-left"
        label="Regresar"
        [routerLink]="'/salones/data/general'"
      ></button>

      <button
        pButton
        type="submit"
        class="py-3 px-5 rounded-xl shadow-md hover:shadow-lg"
        icon="pi pi-check"
        iconPos="right"
        label="Guardar Cambios"
        [disabled]="salonForm.invalid"
        [class]="{
          'p-button-success': !salonForm.invalid,
          'p-button-disabled': salonForm.invalid,
          'opacity-100': !salonForm.invalid,
          'opacity-70': salonForm.invalid,
        }"
      ></button>
    </div>
  </form>

  <!-- Skeleton Loader -->
  <ng-template #loadingTemplate>
    <div class="max-w-5xl mx-auto">
      <app-card-with-title [title]="'Información del Salón'">
        <div class="p-5 bg-blue-50/30">
          <div class="animate-pulse">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div class="space-y-5" *ngFor="let col of [1, 2]">
                <div class="h-4 bg-gray-300 rounded w-1/3"></div>
                <div class="h-12 bg-gray-300 rounded-xl"></div>
              </div>
            </div>
          </div>
        </div>
      </app-card-with-title>

      <div class="flex justify-end gap-4 mt-8 px-2">
        <div class="h-12 bg-gray-300 rounded-xl w-32 animate-pulse"></div>
        <div class="h-12 bg-gray-300 rounded-xl w-40 animate-pulse"></div>
      </div>
    </div>
  </ng-template>
</div>
