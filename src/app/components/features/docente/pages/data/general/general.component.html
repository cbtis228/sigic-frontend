<div class="flex flex-col items-center gap-6 p-6">
  <!-- Header centrado -->
  <div
    class="flex flex-row justify-between items-center w-full max-w-4xl mb-4 gap-4"
  >
    <h2 class="text-2xl font-bold text-gray-800 text-left sm:text-left">
      Información General
    </h2>
    <p-button
      label="Editar"
      severity="info"
      icon="pi pi-pencil"
      routerLink="edit"
    />
  </div>

  <!-- Card centrada y con ancho responsive -->
  <div class="w-full max-w-4xl">
    <app-docente-general-info-card
      [docente]="docente"
      [loading]="!docente"
      class="w-full"
    ></app-docente-general-info-card>
  </div>
</div>
