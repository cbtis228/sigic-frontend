<div class="p-4 sm:p-6 min-h-screen">
  <div class="bg-white rounded-b-xl sm:rounded-b-xl shadow-lg border border-gray-200 border-t-0 overflow-hidden">
    <div class="p-4 sm:p-6">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <h2 class="text-lg sm:text-xl font-bold text-gray-800">Mis Materias</h2>
        <span class="px-3 py-1 bg-brand-100 text-brand-700 rounded-full text-sm font-medium self-start sm:self-auto">
          {{ asignaciones.length }} asignaciones
        </span>
      </div>

      <ng-container *ngIf="asignaciones.length > 0; else materiasSkeleton">
        <div class="grid gap-4 sm:gap-6 grid-cols-1 lg:grid-cols-2 xl:grid-cols-3">
          <div *ngFor="let asignacion of asignaciones"
            class="bg-white border border-brand-100 rounded-xl sm:rounded-2xl p-4 sm:p-6 flex flex-col gap-4 shadow-sm hover:shadow-lg hover:border-brand-300 transition-all duration-200">
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1 min-w-0">
                <h3 class="text-base sm:text-lg font-bold text-brand-900 break-words leading-tight">
                  {{ asignacion.materia.nombre }}
                </h3>
                <p class="text-sm text-gray-500 font-medium mt-1">
                  Clave: <span class="text-brand-700">{{ asignacion.materia.clave }}</span>
                </p>
              </div>
              <button (click)="navigateToGrupoDetails(asignacion.id)"
                class="bg-brand-600 hover:bg-brand-700 text-white px-3 sm:px-4 py-2 rounded-lg text-xs sm:text-sm font-medium transition-colors duration-200 flex items-center justify-center gap-2 shrink-0 mt-1">
                <i class="pi pi-eye text-xs"></i>
                <span class="hidden sm:inline">Ver Detalles</span>
                <span class="sm:hidden">Detalles</span>
              </button>
            </div>

            <div class="border-t border-gray-100 pt-3 flex flex-col gap-2 text-sm text-gray-700">
              <div class="flex justify-between">
                <span>Horas Teóricas:</span>
                <span class="font-semibold">{{ asignacion.materia.horas_teorica || '-' }}</span>
              </div>
              <div class="flex justify-between">
                <span>Horas Prácticas:</span>
                <span class="font-semibold">{{ asignacion.materia.horas_practica || '-' }}</span>
              </div>
            </div>
          </div>

        </div>
      </ng-container>

      <ng-template #materiasSkeleton>
        <div class="grid gap-4 sm:gap-6 grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 animate-pulse">
          <div *ngFor="let i of [1, 2, 3]"
            class="bg-white border border-brand-100 rounded-xl sm:rounded-2xl p-4 sm:p-6">
            <!-- Skeleton header -->
            <div class="flex flex-col gap-3">
              <div class="flex items-start justify-between gap-3">
                <div class="flex-1 min-w-0">
                  <div class="h-5 sm:h-6 bg-brand-200 rounded w-3/4 mb-2"></div>
                </div>
                <div class="h-8 bg-brand-200 rounded w-20 sm:w-24 shrink-0 mt-1"></div>
              </div>
              <div class="flex gap-2">
                <div class="h-5 bg-brand-200 rounded w-16"></div>
                <div class="h-5 bg-brand-200 rounded w-12"></div>
              </div>
            </div>

            <div class="mb-4 mt-4">
              <div class="h-4 bg-brand-200 rounded w-32 mb-3"></div>
              <div class="space-y-2">
                <div *ngFor="let j of [1, 2]" class="p-3 bg-brand-100 rounded-lg">
                  <div class="h-4 bg-brand-300 rounded w-3/4 mb-2"></div>
                  <div class="h-3 bg-brand-300 rounded w-1/2"></div>
                </div>
              </div>
            </div>

            <div
              class="flex flex-col xs:flex-row justify-between items-start xs:items-center pt-3 border-t border-brand-100 gap-2 xs:gap-0">
              <div class="h-3 bg-brand-200 rounded w-16"></div>
              <div class="h-3 bg-brand-200 rounded w-20"></div>
            </div>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</div>
