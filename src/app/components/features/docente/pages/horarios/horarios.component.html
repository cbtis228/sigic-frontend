<div class="min-h-screen p-4 md:p-6">
  <div class="max-w-7xl mx-auto">
    <!-- Header Principal -->
    <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
      <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4"
      >
        <div>
          <div class="flex items-center gap-3 mb-2">
            <h1 class="text-3xl font-bold text-gray-800">
              Gestión de Horarios
            </h1>
            <span
              *ngIf="cicloEscolar"
              class="bg-blue-100 text-blue-800 text-sm font-medium px-3 py-1 rounded-full"
            >
              {{ cicloEscolar.nombre_ciclo }}
            </span>
          </div>
          <p class="text-gray-600 mt-2">
            Administra los horarios de los grupos y docentes.
          </p>

          <div
            *ngIf="cicloEscolar"
            class="flex flex-wrap gap-4 mt-3 text-sm text-gray-500"
          >
            <div class="flex items-center">
              <i class="pi pi-calendar mr-1"></i>
              <span
                >Inicio:
                {{ cicloEscolar.fecha_inicio | date: "dd/MM/yyyy" }}</span
              >
            </div>
            <div class="flex items-center">
              <i class="pi pi-calendar-times mr-1"></i>
              <span
                >Fin: {{ cicloEscolar.fecha_fin | date: "dd/MM/yyyy" }}</span
              >
            </div>
            <div class="flex items-center">
              <i
                class="pi pi-circle-fill mr-1"
                [ngClass]="{
                  'text-green-500': cicloEscolar.estatus === 1,
                  'text-gray-500': cicloEscolar.estatus === 0,
                }"
              ></i>
              <span>{{
                cicloEscolar.estatus === 1 ? "Activo" : "Inactivo"
              }}</span>
            </div>
          </div>
        </div>

        <div class="w-full md:w-1/4 flex flex-wrap gap-3">
          <p-select
            id="id"
            class="w-full"
            [(ngModel)]="cicloEscolar"
            (onChange)="loadGrupos()"
            optionLabel="nombre_ciclo"
            placeholder="Seleccione un ciclo escolar"
            [filter]="true"
            [options]="ciclosEscolares"
          >
          </p-select>
        </div>
      </div>
    </div>
    <app-grupo-horario-list
      [cicloEscolar]="cicloEscolar"
      (onHorarioDetailClick)="onHorarioGrupoDetailClick($event)"
      [(globalFilter)]="grupoGlobalFilter"
      [(estatusFilter)]="grupoEstatusFilter"
      [gruposData]="gruposData"
      (loadTable)="loadGrupos($event)"
    ></app-grupo-horario-list>
  </div>
</div>
