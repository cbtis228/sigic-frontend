<div class="min-h-screen bg-gradient-to-br from-gray-50 to-blue-50 p-4">
  <div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-gray-100">
      <div class="flex items-center gap-3 mb-4">
        <button
          routerLink=".."
          class="p-2 hover:bg-gray-100 rounded-lg transition-colors"
        >
          <i class="pi pi-arrow-left text-gray-600"></i>
        </button>
        <div>
          <h1 class="text-2xl font-bold text-gray-800">Crear Salon</h1>
          <p class="text-gray-600">Completa la información del salon</p>
        </div>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSalonSave()" class="space-y-6">
      <app-card-with-title [title]="'Información del salon'">
        <div class="space-y-6">
          <div class="border-b border-gray-200 pb-6">
            <h2
              class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2"
            >
              <i class="pi pi-calendar text-blue-500"></i>
              Detalles del Salon
            </h2>

            <div class="grid grid-cols-1 gap-6">
              <div class="space-y-2">
                <label for="nombre" class="text-sm font-medium text-gray-700">
                  Nombre *
                </label>
                <input
                  id="nombre"
                  type="text"
                  formControlName="nombre"
                  pInputText
                  placeholder="Ej: Taller Soldadura 1B"
                  class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                  [ngClass]="{
                    'border-red-300':
                      form.get('nombre')?.invalid &&
                      form.get('nombre')?.touched,
                    'border-green-300':
                      form.get('nombre')?.valid && form.get('nombre')?.touched,
                  }"
                />
                <small
                  *ngIf="
                    form.get('nombre')?.invalid && form.get('nombre')?.touched
                  "
                  class="text-red-500 text-sm flex items-center gap-1"
                >
                  <i class="pi pi-exclamation-circle"></i>
                  El nombre es requerido
                </small>
              </div>
            </div>
          </div>

          <div class="border-b border-gray-200 pb-6">
            <h2
              class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2"
            >
              <i class="pi pi-clock text-blue-500"></i>
              Tipo Del Salon
            </h2>

            <div class="grid grid-cols-1 gap-6">
              <div class="space-y-2">
                <label for="tipo" class="text-sm font-medium text-gray-700">
                  Tipo *
                </label>
                <p-select
                  [options]="tipos"
                  appendTo="body"
                  class="w-full"
                  formControlName="tipo"
                ></p-select>
                <small
                  *ngIf="form.get('tipo')?.invalid && form.get('tipo')?.touched"
                  class="text-red-500 text-sm flex items-center gap-1"
                >
                  <i class="pi pi-exclamation-circle"></i>
                  El tipo del salon es requerido
                </small>
              </div>
            </div>
          </div>

          <div class="border-b border-gray-200 pb-6">
            <h2
              class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2"
            >
              <i class="pi pi-clock text-blue-500"></i>
              Datos Adiccionales
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label
                  for="ubicacion"
                  class="text-sm font-medium text-gray-700"
                >
                  Ubicacion
                </label>
                <input
                  class="w-full"
                  pInputText
                  placeholder="Edificios B"
                  formControlName="ubicacion"
                />
              </div>

              <div class="space-y-2">
                <label
                  for="capacidad"
                  class="text-sm font-medium text-gray-700"
                >
                  Capacidad
                </label>
                <p-inputnumber
                  class="w-full"
                  inputId="integeronly"
                  formControlName="capacidad"
                />
              </div>
            </div>
          </div>
        </div>
      </app-card-with-title>

      <div class="mt-6 flex flex-col sm:flex-row justify-end gap-3 pt-6">
        <button
          pButton
          type="button"
          severity="secondary"
          icon="pi pi-arrow-left"
          label="Cancelar"
          routerLink=".."
        ></button>

        <button
          pButton
          type="submit"
          severity="info"
          icon="pi pi-check-square"
          iconPos="right"
          label="Guardar Salon"
          [disabled]="form.invalid"
        ></button>
      </div>
    </form>
  </div>
</div>
