<div
  class="relative min-h-screen flex items-center justify-center overflow-hidden bg-gradient-to-br from-brand-50 via-white to-brand-100 px-4"
>
  <div class="absolute inset-0 pointer-events-none">
    <div
      class="absolute -top-32 -right-32 w-60 h-60 md:w-96 md:h-96 md:-top-40 md:-right-40 bg-brand-300 rounded-full mix-blend-multiply blur-3xl opacity-15 md:opacity-30 hidden sm:block animate-blob"
    ></div>

    <div
      class="absolute -bottom-32 -left-32 w-60 h-60 md:w-96 md:h-96 md:-bottom-40 md:-left-40 bg-brand-400 rounded-full mix-blend-multiply blur-3xl opacity-10 md:opacity-20 hidden sm:block animate-blob animation-delay-2000"
    ></div>

    <div
      class="absolute top-1/2 left-1/2 w-80 h-80 -translate-x-1/2 -translate-y-1/2 bg-brand-200 rounded-full mix-blend-multiply blur-3xl opacity-20 hidden md:block animate-blob animation-delay-4000"
    ></div>
  </div>

  <!-- Contenedor principal -->
  <div class="relative z-10 w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-8">
      <div
        class="mx-auto mb-6 w-24 h-24 rounded-2xl flex items-center justify-center shadow-2xl"
      >
        <img src="assets/logo_cbtis.png" alt="CBTis 228" class="h-16 w-16" />
      </div>

      <h1 class="text-3xl font-bold text-brand-950 tracking-tight">
        Sistema Académico
      </h1>
      <p class="mt-2 text-sm text-brand-700">
        Accede a tu cuenta para continuar
      </p>
    </div>

    <!-- Card -->
    <div
      class="bg-white/70 backdrop-blur-xl border border-white/40 rounded-2xl shadow-xl p-8"
    >
      <!-- Google -->
      <button
        (click)="loginWithGoogle()"
        class="w-full flex items-center justify-center gap-3 py-4 rounded-xl border border-gray-200 bg-white text-sm font-medium text-gray-800 hover:bg-gray-50 hover:shadow-md transition-all duration-300 active:scale-[0.98]"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path
            fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          />
          <path
            fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          />
          <path
            fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
          />
          <path
            fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          />
        </svg>
        Continuar con Google
      </button>

      <!-- Separador -->
      <div class="relative my-8">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300/50"></div>
        </div>
        <div class="relative flex justify-center">
          <span class="bg-white/80 px-4 text-xs text-gray-500">
            o accede con tus credenciales
          </span>
        </div>
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="loginWithCredentials()">
        <div class="space-y-4">
          <input
            formControlName="username"
            placeholder="Usuario"
            class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-200 transition"
          />

          <input
            type="password"
            formControlName="password"
            placeholder="Contraseña"
            class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-200 transition"
          />

          <button
            type="submit"
            [disabled]="loginForm.invalid"
            class="w-full py-3 rounded-xl text-white font-medium bg-brand-500 hover:bg-brand-600 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Iniciar sesión
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
