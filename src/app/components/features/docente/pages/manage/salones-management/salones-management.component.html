<div class="min-h-screen p-4">
  <div class="max-w-7xl mx-auto">
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-gray-100">
      <div
        class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4"
      >
        <div>
          <h1 class="text-3xl font-bold text-gray-800">Salones</h1>
          <p class="text-gray-600 mt-2">
            Administra los salones disponibles en la institucion
          </p>
        </div>

        <div
          *ngIf="permissionsService.has$('academico.add_salon') | async"
          class="flex flex-wrap gap-3"
        >
          <p-button
            icon="pi pi-plus"
            label="Nuevo Salon"
            severity="success"
            class="custom-success-btn"
            routerLink="create"
          />
        </div>
      </div>
    </div>

    <div
      *ngIf="!salonData"
      class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100"
    >
      <div class="animate-pulse space-y-4">
        <div class="flex gap-4 mb-6">
          <div class="h-12 bg-gray-100 rounded-lg flex-1"></div>
          <div class="h-12 bg-gray-100 rounded-lg w-24"></div>
        </div>
        <div
          *ngFor="let item of [1, 2, 3, 4, 5]"
          class="grid grid-cols-5 gap-4"
        >
          <div class="h-4 bg-gray-100 rounded"></div>
          <div class="h-4 bg-gray-200 rounded col-span-2"></div>
          <div class="h-4 bg-gray-100 rounded"></div>
          <div class="h-4 bg-gray-100 rounded"></div>
        </div>
      </div>
    </div>

    <div
      *ngIf="salonData"
      class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100"
    >
      <div
        class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-6"
      >
        <div class="relative flex-1 max-w-md">
          <span class="flex p-input-icon-left w-full">
            <input
              pInputText
              type="text"
              (input)="onGlobalFilterChange($event)"
              placeholder="Buscar salones..."
              class="w-full"
            />
          </span>
        </div>

        <div class="flex items-center gap-3">
          <p-button
            icon="pi pi-filter"
            severity="secondary"
            (click)="dt.reset()"
            label="Limpiar"
            class="custom-secondary-btn"
          />
        </div>
      </div>

      <p-table
        #dt
        *ngIf="salonData"
        [lazyLoadOnInit]="false"
        [paginator]="true"
        [rowHover]="true"
        [rows]="10"
        [value]="salonData.results"
        [totalRecords]="salonData.count"
        [rowsPerPageOptions]="[10, 20, 30]"
        (onLazyLoad)="onTableEvent($event)"
        [lazy]="true"
        [globalFilterFields]="[
          'id',
          'nombre',
          'ubicacion',
          'capacidad',
          'tipo',
        ]"
        responsiveLayout="scroll"
        currentPageReportTemplate="Mostrando de {first} a {last} de un total de {totalRecords} salones"
        [showCurrentPageReport]="true"
      >
        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="id">
              <div class="flex justify-between items-center gap-2">
                ID
                <p-sortIcon field="id" />
                <p-columnFilter
                  type="text"
                  field="id"
                  display="menu"
                  matchMode="contains"
                  class="ml-auto"
                />
              </div>
            </th>

            <th pSortableColumn="nombre">
              <div class="flex justify-between items-center gap-2">
                Nombre
                <p-sortIcon field="nombre" />
                <p-columnFilter
                  type="text"
                  field="nombre"
                  display="menu"
                  class="ml-auto"
                />
              </div>
            </th>

            <th pSortableColumn="ubicacion">
              <div class="flex justify-between items-center gap-2">
                Ubicación
                <p-sortIcon field="ubicacion" />
                <p-columnFilter
                  type="text"
                  field="ubicacion"
                  display="menu"
                  class="ml-auto"
                />
              </div>
            </th>

            <th pSortableColumn="capacidad">
              <div class="flex justify-between items-center gap-2">
                Capacidad
                <p-sortIcon field="capacidad" />
                <p-columnFilter
                  type="numeric"
                  field="capacidad"
                  display="menu"
                  class="ml-auto"
                />
              </div>
            </th>

            <th pSortableColumn="tipo">
              <div class="flex justify-between items-center gap-2">
                Tipo
                <p-sortIcon field="tipo" />
                <p-columnFilter
                  type="text"
                  field="tipo"
                  display="menu"
                  class="ml-auto"
                />
              </div>
            </th>

            <th pSortableColumn="estatus">
              <div class="flex justify-between items-center gap-2">
                Estatus
                <p-sortIcon field="estatus" />
                <p-columnFilter
                  type="text"
                  field="estatus"
                  display="menu"
                  class="ml-auto"
                />
              </div>
            </th>

            <th>Acciones</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-salon>
          <tr>
            <td>{{ salon.id }}</td>
            <td>{{ salon.nombre }}</td>
            <td>{{ salon.ubicacion || "No especificado" }}</td>
            <td>{{ salon.capacidad || "No especificado"}}</td>
            <td>{{ salon.tipo_display }}</td>
            <td>
              <span
                class="px-3 py-1 rounded-full text-xs font-medium"
                [ngClass]="{
                  'bg-green-100 text-green-800': salon.estatus === 1,
                  'bg-orange-100 text-orange-800': salon.estatus === 2,
                }"
              >
                {{ salon.estatus_display }}
              </span>
            </td>
            <td>
              <div class="flex items-center gap-2">
                <p-menu
                  #menu
                  [model]="menuItems"
                  appendTo="body"
                  [popup]="true"
                ></p-menu>
                <p-button
                  icon="pi pi-ellipsis-v"
                  severity="secondary"
                  [rounded]="true"
                  [text]="true"
                  class="custom-action-btn"
                  (click)="updateMenuItems(salon); menu.toggle($event)"
                />
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>
