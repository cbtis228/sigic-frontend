<div class="p-6 min-h-screen">
  <form
    [formGroup]="cicloEscolarForm"
    (ngSubmit)="onSubmit()"
    *ngIf="!showSkeletons; else loadingTemplate"
    class="max-w-5xl mx-auto"
  >
    <app-card-with-title [title]="'Información del Ciclo Escolar'">
      <div class="p-5 bg-blue-50/30">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="space-y-4">
            <!-- Nombre del Ciclo -->
            <div class="field">
              <label
                for="nombre_ciclo"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span class="bg-blue-100 text-blue-800 rounded-full p-1 mr-2">
                  <i class="pi pi-calendar text-xs"></i>
                </span>
                Nombre del Ciclo <span class="text-red-500 ml-1">*</span>
              </label>
              <input
                pInputText
                type="text"
                formControlName="nombre_ciclo"
                id="nombre_ciclo"
                class="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                placeholder="Ej: 2023-2024"
              />
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  cicloEscolarForm.get('nombre_ciclo')?.invalid &&
                  cicloEscolarForm.get('nombre_ciclo')?.touched
                "
              >
                El nombre del ciclo es requerido
              </small>
            </div>

            <!-- Fecha de Inicio -->
            <div class="field">
              <label
                for="fecha_inicio"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span class="bg-green-100 text-green-800 rounded-full p-1 mr-2">
                  <i class="pi pi-play text-xs"></i>
                </span>
                Fecha de Inicio <span class="text-red-500 ml-1">*</span>
              </label>
              <p-datepicker
                inputId="fecha_inicio"
                appendTo="body"
                formControlName="fecha_inicio"
                iconDisplay="input"
                dateFormat="dd/mm/yy"
                [class]="{ 'w-full': true }"
                placeholder="Seleccione la fecha de inicio"
                class="w-full [&>span]:w-full"
              ></p-datepicker>
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  cicloEscolarForm.get('fecha_inicio')?.invalid &&
                  cicloEscolarForm.get('fecha_inicio')?.touched
                "
              >
                La fecha de inicio es requerida
              </small>
            </div>
          </div>

          <div class="space-y-4">
            <!-- Estatus -->
            <div class="field">
              <label
                for="estatus"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span
                  class="bg-purple-100 text-purple-800 rounded-full p-1 mr-2"
                >
                  <i class="pi pi-check-circle text-xs"></i>
                </span>
                Estatus <span class="text-red-500 ml-1">*</span>
              </label>
              <p-select
                inputId="estatus"
                formControlName="estatus"
                [options]="estadosCiclo"
                optionLabel="label"
                optionValue="value"
                placeholder="Selecciona un estatus"
                class="w-full"
                appendTo="body"
                [class]="{
                  'p-invalid':
                    cicloEscolarForm.get('estatus')?.invalid &&
                    cicloEscolarForm.get('estatus')?.touched,
                }"
              >
              </p-select>
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  cicloEscolarForm.get('estatus')?.invalid &&
                  cicloEscolarForm.get('estatus')?.touched
                "
              >
                El estatus es requerido
              </small>
            </div>

            <div class="field">
              <label
                for="fecha_fin"
                class="text-sm font-semibold text-gray-700 mb-2 flex items-center"
              >
                <span class="bg-red-100 text-red-800 rounded-full p-1 mr-2">
                  <i class="pi pi-stop text-xs"></i>
                </span>
                Fecha de Fin <span class="text-red-500 ml-1">*</span>
              </label>
              <p-datepicker
                inputId="fecha_fin"
                appendTo="body"
                formControlName="fecha_fin"
                iconDisplay="input"
                dateFormat="dd/mm/yy"
                [class]="{ 'w-full': true }"
                placeholder="Seleccione la fecha de fin"
                class="w-full [&>span]:w-full"
              ></p-datepicker>
              <small
                class="text-red-500 text-xs"
                *ngIf="
                  cicloEscolarForm.get('fecha_fin')?.invalid &&
                  cicloEscolarForm.get('fecha_fin')?.touched
                "
              >
                La fecha de fin es requerida
              </small>
            </div>
          </div>
        </div>

        <!-- Validación de fechas -->
        <div
          *ngIf="
            cicloEscolarForm.errors?.['fechasInvalidas'] &&
            cicloEscolarForm.get('fecha_inicio')?.touched &&
            cicloEscolarForm.get('fecha_fin')?.touched
          "
          class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg"
        >
          <div class="flex items-center">
            <i class="pi pi-exclamation-triangle text-red-500 mr-2"></i>
            <span class="text-red-700 text-sm"
              >La fecha de fin debe ser posterior a la fecha de inicio.</span
            >
          </div>
        </div>

        <!-- Duración calculada -->
        <div
          *ngIf="
            cicloEscolarForm.get('fecha_inicio')?.value &&
            cicloEscolarForm.get('fecha_fin')?.value &&
            !cicloEscolarForm.errors?.['fechasInvalidas']
          "
          class="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-lg"
        >
          <div class="flex items-center">
            <i class="pi pi-info-circle text-blue-500 mr-2"></i>
            <span class="text-blue-700 text-sm">
              Duración: {{ calcularDuracion() }}
            </span>
          </div>
        </div>
      </div>
    </app-card-with-title>

    <div class="flex flex-col sm:flex-row justify-end gap-4 mt-8 px-2">
      <button
        pButton
        type="button"
        class="p-button-outlined p-button-secondary shadow-md hover:shadow-lg transition-all duration-300 py-3 px-5 rounded-xl"
        icon="pi pi-arrow-left"
        label="Regresar"
        [routerLink]="'/ciclo-escolar/data/general'"
      ></button>
      <button
        pButton
        type="submit"
        class="shadow-md hover:shadow-lg transition-all duration-300 py-3 px-5 rounded-xl"
        icon="pi pi-check"
        iconPos="right"
        label="Guardar Cambios"
        [disabled]="cicloEscolarForm.invalid"
        [class]="{
          'p-button-success': !cicloEscolarForm.invalid,
          'p-button-disabled': cicloEscolarForm.invalid,
          'opacity-100': !cicloEscolarForm.invalid,
          'opacity-70': cicloEscolarForm.invalid,
        }"
      ></button>
    </div>
  </form>

  <ng-template #loadingTemplate>
    <div class="max-w-5xl mx-auto">
      <app-card-with-title [title]="'Información del Ciclo Escolar'">
        <div class="p-5 bg-blue-50/30">
          <div class="animate-pulse">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div class="space-y-5">
                <div *ngFor="let item of [1, 2]" class="space-y-3">
                  <div class="h-4 bg-gray-300 rounded w-1/3"></div>
                  <div class="h-12 bg-gray-300 rounded-xl"></div>
                </div>
              </div>
              <div class="space-y-5">
                <div *ngFor="let item of [1, 2]" class="space-y-3">
                  <div class="h-4 bg-gray-300 rounded w-1/3"></div>
                  <div class="h-12 bg-gray-300 rounded-xl"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </app-card-with-title>

      <div class="flex justify-end gap-4 mt-8 px-2">
        <div class="h-12 bg-gray-300 rounded-xl w-32 animate-pulse"></div>
        <div class="h-12 bg-gray-300 rounded-xl w-40 animate-pulse"></div>
      </div>
    </div>
  </ng-template>
</div>
