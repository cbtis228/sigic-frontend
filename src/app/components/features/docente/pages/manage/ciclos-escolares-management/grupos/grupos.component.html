<div class="p-4">

  <div
    class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4"
  >

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 flex-1">
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <div class="text-2xl font-bold text-blue-600">{{ grupos.length }}</div>
        <div class="text-sm text-gray-600">Total Grupos</div>
      </div>
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <div class="text-2xl font-bold text-green-600">{{ gruposActivos }}</div>
        <div class="text-sm text-gray-600">Grupos Activos</div>
      </div>
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <div class="text-2xl font-bold text-orange-600">
          {{ gruposConCupo }}
        </div>
        <div class="text-sm text-gray-600">Con Cupo Disponible</div>
      </div>
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <div class="text-2xl font-bold text-red-600">{{ gruposLlenos }}</div>
        <div class="text-sm text-gray-600">Completamente Llenos</div>
      </div>
    </div>


    <button
      class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold transition-colors duration-300 flex items-center shadow-md hover:shadow-lg"
      routerLink="create"
    >
      <i class="pi pi-plus-circle mr-2"></i>
      Nuevo Grupo
    </button>
  </div>


  <div
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
  >
    <div *ngFor="let grupo of grupos">
      <app-grupo-summary-card [grupo]="grupo"></app-grupo-summary-card>
    </div>
  </div>

  <div
    *ngIf="grupos.length === 0"
    class="text-center py-12 bg-white rounded-lg shadow"
  >
    <i class="pi pi-inbox text-4xl text-gray-400"></i>
    <h3 class="text-lg font-semibold text-gray-600 mt-2">No hay grupos</h3>
    <p class="text-gray-500">
      No se encontraron grupos registrados en el sistema.
    </p>

    <button
      class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold transition-colors duration-300 flex items-center mx-auto"
      routerLink="create"
    >
      <i class="pi pi-plus-circle mr-2"></i>
      Crear Primer Grupo
    </button>
  </div>
</div>
